<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สอนมายากล - Magic Slides</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --magic-purple: #A78BFA;
            --magic-bg: #030308;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--magic-bg);
            color: #FFFFFF;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Enchanted Glass Card */
        .magic-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            flex: 0 0 auto;
            width: 280px; /* Desktop width */
        }

        @media (max-width: 640px) {
            .magic-card {
                width: 160px; /* Mobile width */
            }
        }

        .magic-card:hover {
            transform: scale(1.05);
            border-color: var(--magic-purple);
            background: rgba(255, 255, 255, 0.06);
            z-index: 10;
        }

        /* Mirror Shadow */
        .card-mirror {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%) scaleY(-1);
            width: 90%;
            height: 40px;
            background: linear-gradient(to top, rgba(167, 139, 250, 0.2), transparent);
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
        }

        .magic-card:hover .card-mirror {
            opacity: 1;
        }

        /* Horizontal Scroll Containers */
        .slide-container {
            display: flex;
            overflow-x: auto;
            gap: 1.25rem;
            padding: 1rem 1rem 2.5rem 1rem;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        @media (max-width: 640px) {
            .slide-container {
                gap: 0.75rem;
            }
        }

        .slide-container::-webkit-scrollbar { display: none; }
        
        .magic-card {
            scroll-snap-align: start;
        }

        /* Category Button */
        .cat-jump-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            white-space: nowrap;
            font-size: 0.875rem;
        }

        .cat-jump-btn:hover {
            border-color: var(--magic-purple);
            background: rgba(167, 139, 250, 0.1);
        }

        /* Nav Glass */
        .nav-blur {
            background: rgba(3, 3, 8, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
        }
    </style>
</head>
<body class="pb-32">

    <!-- Ambient Magic Light -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] right-[-10%] w-[60%] h-[60%] bg-purple-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-20%] left-[-10%] w-[60%] h-[60%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    </div>

    <!-- Header & Search -->
    <header class="sticky top-0 z-50 nav-blur">
        <div class="max-w-7xl mx-auto px-4 py-4 space-y-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()">
                    <div class="w-10 h-10 rounded-xl bg-purple-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
                        <i data-lucide="wand-2" class="text-white w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight text-white uppercase italic">สอนมายากล</h1>
                        <p class="text-purple-400 text-[8px] tracking-[0.4em] font-bold">THE SECRET GALLERY</p>
                    </div>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4">
                    <button onclick="openFavs()" class="p-2.5 rounded-xl bg-white/5 border border-white/10 text-red-400 hover:bg-red-500/10 transition-colors">
                        <i data-lucide="heart" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Search -->
            <div class="relative w-full group">
                <input type="text" id="search-input" oninput="handleSearch(this.value)"
                       placeholder="ค้นหาความลับมายากลที่นี่..." 
                       class="w-full bg-white/5 border border-white/10 rounded-xl py-3 pl-11 pr-4 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500/50 transition-all text-white placeholder-white/30">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-white/30 transition-colors group-focus-within:text-purple-400"></i>
            </div>

            <!-- Jump to Category -->
            <div id="category-bar" class="flex overflow-x-auto gap-2 pb-2 scroll-smooth no-scrollbar">
                <!-- JS Inject Jump Buttons -->
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto pt-6">
        <!-- Sections will be injected here -->
        
        <div id="loader" class="flex flex-col items-center justify-center py-40">
            <div class="w-10 h-10 border-2 border-purple-500/20 border-t-purple-500 rounded-full animate-spin mb-4"></div>
            <p class="text-white/40 text-xs tracking-widest animate-pulse">กำลังจัดสำรับมนตรา...</p>
        </div>
    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
        <div class="nav-blur px-8 py-3.5 rounded-2xl flex gap-12 shadow-2xl border border-white/10">
            <button onclick="goHome()" class="flex flex-col items-center text-white hover:text-purple-400 transition-all">
                <i data-lucide="layout-grid" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold uppercase tracking-tighter">หมวดหมู่</span>
            </button>
            <button onclick="openFavs()" class="flex flex-col items-center text-white/40 hover:text-red-400 transition-all">
                <i data-lucide="star" class="w-5 h-5"></i>
                <span class="text-[9px] mt-1 font-bold uppercase tracking-tighter">บันทึกไว้</span>
            </button>
        </div>
    </nav>

    <!-- Modal Player -->
    <div id="video-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="relative w-full max-w-4xl nav-blur rounded-[2.5rem] overflow-hidden shadow-2xl border border-white/10">
            <button onclick="closeModal()" class="absolute top-5 right-5 z-[110] bg-white/5 hover:bg-red-500/20 p-2.5 rounded-full transition-all border border-white/10">
                <i data-lucide="x" class="w-5 h-5 text-white"></i>
            </button>
            <div class="aspect-video bg-black">
                <div id="player-container" class="w-full h-full"></div>
            </div>
            <div class="p-6 md:p-10 text-center">
                <h2 id="modal-title" class="text-lg md:text-2xl font-bold text-white mb-6 line-clamp-2 px-6">ชื่อ ep มายากล</h2>
                <button id="modal-fav-btn" onclick="toggleFavoriteCurrent()" class="px-10 py-3.5 rounded-2xl font-bold text-sm flex items-center gap-2 mx-auto transition-all active:scale-95 shadow-lg">
                    <i data-lucide="heart" class="w-4 h-4"></i>
                    <span>จดบันทึก ep นี้</span>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTNQ4GOkKANdu3ao91D9BEk2IGSq6zuEkm5vm2eaiuHeiTBBnjJe0KCUaYYhfohnWlbz77LjNgRBLJn/pub?output=csv";

        let allVideos = [];
        let currentPlaylist = [];
        let currentIndex = -1;
        let favorites = JSON.parse(localStorage.getItem('magic_slides_favs') || '[]');
        let currentVideo = null;
        let player = null;

        function extractID(url) {
            if (!url) return null;
            const match = url.match(/(?:youtu\.be\/|youtube\.com\/(?:.*v=|.*\/|.*embed\/))([^?&"'>\s]+)/);
            return (match && match[1].length === 11) ? match[1] : null;
        }

        async function fetchVideos() {
            try {
                const res = await fetch(CSV_URL);
                const data = await res.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);

                allVideos = rows.map((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cat = (cols[0] || 'ทั่วไป').replace(/"/g, '').trim();
                    const title = (cols[1] || 'ep ลับ').replace(/"/g, '').trim();
                    const url = (cols[2] || '').replace(/"/g, '').trim();
                    const vId = extractID(url);
                    return { id: 'm_'+i, category: cat, title, vId, thumb: vId ? `https://i.ytimg.com/vi/${vId}/mqdefault.jpg` : null };
                }).filter(v => v.vId);

                document.getElementById('loader').classList.add('hidden');
                renderHome();
            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = '<p class="text-red-400 text-xs">พลังงานขัดข้อง กรุณารีเฟรช</p>';
            }
        }

        function renderHome() {
            const container = document.getElementById('main-content');
            const categoryBar = document.getElementById('category-bar');
            if (!container || !categoryBar) return;
            container.innerHTML = '';
            categoryBar.innerHTML = '';

            const groups = allVideos.reduce((acc, video) => {
                acc[video.category] = acc[video.category] || [];
                acc[video.category].push(video);
                return acc;
            }, {});

            Object.entries(groups).forEach(([category, videos], idx) => {
                // Add Jump Button
                const jumpBtn = document.createElement('button');
                jumpBtn.className = 'cat-jump-btn px-4 py-2 rounded-xl text-white/60 font-medium';
                jumpBtn.textContent = category;
                
                jumpBtn.onclick = () => {
                    const sectionEl = document.getElementById('section-'+idx);
                    if (sectionEl) {
                        sectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    } else {
                        goHome();
                        setTimeout(() => {
                            const newSectionEl = document.getElementById('section-'+idx);
                            if (newSectionEl) newSectionEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        }, 100);
                    }
                };
                categoryBar.appendChild(jumpBtn);

                // Create Section
                const section = document.createElement('section');
                section.id = 'section-' + idx;
                section.className = 'mb-6 scroll-mt-32';
                section.innerHTML = `
                    <div class="section-header">
                        <h2 class="text-lg md:text-xl font-bold text-white flex items-center gap-2">
                            <span class="w-1.5 h-6 bg-purple-500 rounded-full"></span> ${category}
                        </h2>
                        <span class="text-[10px] font-bold text-white/30 uppercase tracking-widest">${videos.length} ep</span>
                    </div>
                    <div class="slide-container" id="row-${idx}">
                        ${videos.map((v, i) => renderCard(v, idx, i)).join('')}
                    </div>
                `;
                container.appendChild(section);
            });
            lucide.createIcons();
        }

        function renderCard(v, sectionIdx, videoIdx) {
            return `
                <div class="magic-card group cursor-pointer" onclick="playFromSection('${v.category.replace(/'/g, "\\'")}', ${videoIdx})">
                    <div class="card-mirror"></div>
                    <div class="relative w-full aspect-video rounded-t-2xl overflow-hidden">
                        <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" loading="lazy">
                        <div class="absolute inset-0 bg-black/20 group-hover:bg-black/0 transition-colors"></div>
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center shadow-xl transform translate-y-2 group-hover:translate-y-0 transition-transform">
                                <i data-lucide="play" class="w-5 h-5 text-white fill-current translate-x-0.5"></i>
                            </div>
                        </div>
                    </div>
                    <div class="p-3 md:p-5">
                        <h3 class="text-[11px] md:text-[15px] font-medium text-white/90 line-clamp-2 leading-tight group-hover:text-purple-400 transition-colors">
                            ${v.title}
                        </h3>
                    </div>
                </div>
            `;
        }

        function handleSearch(term) {
            const q = term.toLowerCase().trim();
            const container = document.getElementById('main-content');
            if (!container) return;
            if(!q) { renderHome(); return; }

            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(q) || v.category.toLowerCase().includes(q));
            currentPlaylist = filtered;
            
            container.innerHTML = `
                <div class="px-4 mb-6">
                    <h2 class="text-sm text-white/40 uppercase tracking-widest mb-6">ผลการค้นหาสำหรับ: <span class="text-purple-400">${term}</span></h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${filtered.map((v, i) => renderCard(v, 'search', i)).join('')}
                    </div>
                </div>
            `;
            if(filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-white/20">
                        <i data-lucide="search-x" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>ไม่พบคลิปที่ค้นหา</p>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        function playFromSection(category, index) {
            const sectionVideos = allVideos.filter(v => v.category === category);
            currentPlaylist = sectionVideos;
            playVideo(index);
        }

        function playVideo(i) {
            if (i < 0 || i >= currentPlaylist.length) return;
            currentIndex = i;
            currentVideo = currentPlaylist[i];
            
            const titleEl = document.getElementById('modal-title');
            const modalEl = document.getElementById('video-modal');
            if (titleEl) titleEl.textContent = currentVideo.title;
            if (modalEl) modalEl.classList.remove('hidden');
            document.body.style.overflow = 'hidden';

            if (!player) {
                player = new YT.Player('player-container', {
                    height: '100%', width: '100%', videoId: currentVideo.vId,
                    playerVars: { 'autoplay': 1, 'rel': 0, 'modestbranding': 1, 'origin': window.location.origin },
                    events: { 'onStateChange': (e) => { if (e.data === YT.PlayerState.ENDED) playNext(); } }
                });
            } else {
                player.loadVideoById(currentVideo.vId);
            }
            updateFavBtn();
        }

        function playNext() {
            if (currentIndex < currentPlaylist.length - 1) playVideo(currentIndex + 1);
            else playVideo(0);
        }

        function closeModal() {
            const modalEl = document.getElementById('video-modal');
            if (modalEl) modalEl.classList.add('hidden');
            document.body.style.overflow = 'auto';
            if (player) player.stopVideo();
        }

        function goHome() {
            closeModal();
            const searchInput = document.getElementById('search-input');
            if (searchInput) searchInput.value = "";
            renderHome();
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function toggleFavoriteCurrent() {
            if (!currentVideo) return;
            const idx = favorites.indexOf(currentVideo.id);
            if (idx > -1) favorites.splice(idx, 1);
            else favorites.push(currentVideo.id);
            localStorage.setItem('magic_slides_favs', JSON.stringify(favorites));
            updateFavBtn();
        }

        function updateFavBtn() {
            const btn = document.getElementById('modal-fav-btn');
            if (!btn || !currentVideo) return;
            const isFav = favorites.includes(currentVideo.id);
            btn.className = `px-10 py-3.5 rounded-2xl font-bold text-sm flex items-center gap-2 mx-auto transition-all active:scale-95 shadow-xl ${isFav ? 'bg-red-500 text-white shadow-red-500/20' : 'bg-white/10 text-white hover:bg-white/20'}`;
            btn.querySelector('span').textContent = isFav ? 'ลบออกจากบันทึก' : 'จดบันทึก ep นี้';
            lucide.createIcons();
        }

        function openFavs() {
            const list = allVideos.filter(v => favorites.includes(v.id));
            currentPlaylist = list;
            const container = document.getElementById('main-content');
            if (!container) return;
            container.innerHTML = `
                <div class="px-4 mb-6">
                    <h2 class="text-sm text-red-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="star" class="w-4 h-4"></i> ep ที่จดบันทึกไว้
                    </h2>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${list.map((v, i) => renderCard(v, 'fav', i)).join('')}
                    </div>
                </div>
            `;
            if(list.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-white/20">
                        <i data-lucide="star-off" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                        <p>คุณยังไม่มี ep ที่บันทึกไว้</p>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        lucide.createIcons();
        window.onload = fetchVideos;
    </script>
</body>
</html>
